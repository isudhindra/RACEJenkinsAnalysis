# ============================================================================
# Auto-generated rules.yaml — bootstrap draft for log-analysis onboarding
# Generated from 51 error samples across 19 groups
# Review and refine before production use.
# ============================================================================

# Fallback labels for edge cases where no rule matches
fallback_labels:
  no_console_log: "No Console Data"
  no_pattern_match: "Unclassified Failure"
  success: "\u2014"
  in_progress: "Build Running"
  aborted: "Build Aborted"

# Domain color mapping for frontend display
domain_colors:
  "API / Backend Service": "blue"
  "Automation / Framework": "slate"
  "Browser / Driver": "indigo"
  "Build / Configuration": "purple"
  "Environment / Infrastructure": "orange"
  "Test Data": "amber"
  "UI / Frontend": "teal"
  "Unknown": "gray"

rules:

  # ==========================================================================
  # TIER 1: High-frequency patterns (3+ samples)
  # ==========================================================================

  - name: "timeout"
    priority: 10
    domain: "Environment / Infrastructure"
    subcategory: "Timeout"
    impact: "Infrastructure Likely"
    label: "Timeout"
    patterns:
      - "TimeoutException"
      - "(?i)timed? ?out"
      - "Navigation timeout"
      - "(?i)page load timed out"
    action: "Check infrastructure health and network connectivity. Review timeout thresholds."
    scope: "global"
    # match_count: 7 | jobs: frontend-selenium-suite, order-processing-e2e, checkout-integration-tests

  - name: "assertion_logic_error"
    priority: 13
    domain: "Automation / Framework"
    subcategory: "Assertion Logic Error"
    impact: "Test Issue"
    label: "Assertion Logic Error"
    patterns:
      - "AssertionError"
      - "(?i)expected.+but (?:got|was|received)"
      - "(?i)assert(?:ion)? (?:failed|error)"
      - "assert\\.\\w+\\("
      - "(?i)record not found"
      - "(?i)no data returned"
    action: "Review assertion logic and expected values. Check test data setup."
    scope: "global"
    # match_count: 6 | jobs: nightly-data-integrity, checkout-integration-tests, order-processing-e2e

  - name: "locator_mismatch"
    priority: 16
    domain: "UI / Frontend"
    subcategory: "Locator Mismatch"
    impact: "Test Issue"
    label: "Locator Mismatch"
    patterns:
      - "NoSuchElementException"
      - "(?i)unable to locate element"
      - "(?i)element not found"
      - "(?i)no such element"
      - "(?i)stale element reference"
    action: "Review locator strategy. Check if UI changed in recent deployment."
    scope: "global"
    # match_count: 4 | jobs: frontend-selenium-suite, checkout-integration-tests, platform-full-regression

  - name: "null_reference"
    priority: 19
    domain: "Automation / Framework"
    subcategory: "Null Reference"
    impact: "Test Issue"
    label: "Null Reference"
    patterns:
      - "NullPointerException"
      - "TypeError.*(?:null|undefined)"
    action: "Review code for null/undefined reference handling. Add defensive checks."
    scope: "global"
    # match_count: 4 | jobs: user-auth-e2e, payment-api-unit-tests

  - name: "connection_refused"
    priority: 22
    domain: "Environment / Infrastructure"
    subcategory: "Connection Refused"
    impact: "Infrastructure Likely"
    label: "Connection Refused"
    patterns:
      - "ConnectException"
      - "Connection refused"
      - "ECONNREFUSED"
      - "(?i)could not connect to server"
    action: "Verify target service is running and accessible. Check firewall and network policies."
    scope: "global"
    # match_count: 3 | jobs: inventory-service-smoke, database-migration-check

  - name: "out_of_memory"
    priority: 25
    domain: "Environment / Infrastructure"
    subcategory: "Out of Memory"
    impact: "Infrastructure Likely"
    label: "Out of Memory"
    patterns:
      - "ReportOOMFailure"
      - "(?i)heap.*out of memory"
      - "OutOfMemoryError"
      - "Cannot allocate memory"
    action: "Increase heap size or memory allocation. Review memory leak possibilities."
    scope: "global"
    # match_count: 3 | jobs: weekly-compliance-scan

  - name: "http_5xx"
    priority: 28
    domain: "API / Backend Service"
    subcategory: "HTTP 5xx"
    impact: "Product Regression Likely"
    label: "HTTP 5xx"
    patterns:
      - "InternalError"
      - "HTTP/1\\.1 5\\d{2}"
      - "Bad Gateway"
      - "(?i)expected.+but (?:got|was|received)"
      - "Internal Server Error"
      - "Service Unavailable"
    action: "Check service deployment logs. Likely backend regression."
    scope: "global"
    # match_count: 3 | jobs: api-contract-validation, payment-api-unit-tests

  - name: "connection_reset"
    priority: 31
    domain: "Environment / Infrastructure"
    subcategory: "Connection Reset"
    impact: "Infrastructure Likely"
    label: "Connection Reset"
    patterns:
      - "SocketException"
      - "ECONNRESET"
      - "socket hang up"
      - "Connection reset"
    action: "Check network stability. Service may have crashed or forcibly closed the connection."
    scope: "global"
    # match_count: 3 | jobs: inventory-service-smoke, cdn-cache-validation, payment-api-unit-tests

  # ==========================================================================
  # TIER 2: Moderate-frequency patterns (2 samples)
  # ==========================================================================

  - name: "database_connection"
    priority: 50
    domain: "Environment / Infrastructure"
    subcategory: "Database Connection"
    impact: "Infrastructure Likely"
    label: "Database Connection"
    patterns:
      - "PSQLException"
      - "Connection pool exhausted"
      - "too many connections"
      - "(?i)database.*unavailable"
    action: "Verify database is running and accessible. Check connection pool settings."
    scope: "global"
    # match_count: 2 | jobs: order-processing-e2e, platform-full-regression

  - name: "ssl_tls_error"
    priority: 53
    domain: "Environment / Infrastructure"
    subcategory: "SSL/TLS Error"
    impact: "Infrastructure Likely"
    label: "SSL/TLS Error"
    patterns:
      - "SSLCertVerificationError"
      - "SSLHandshakeException"
      - "(?i)SSL.*certificate"
      - "CERTIFICATE_VERIFY_FAILED"
    action: "Verify SSL certificate validity and chain. Check certificate expiration dates."
    scope: "global"
    # match_count: 2 | jobs: cdn-cache-validation

  - name: "webdriver_session_failure"
    priority: 56
    domain: "Browser / Driver"
    subcategory: "WebDriver Session Failure"
    impact: "Infrastructure Likely"
    label: "WebDriver Session Failure"
    patterns:
      - "WebDriverException"
      - "SessionNotCreatedException"
      - "(?i)session not created"
      - "(?i)unable to create session"
      - "Internal Server Error"
    action: "Verify WebDriver and browser version compatibility."
    scope: "global"
    # match_count: 2 | jobs: frontend-selenium-suite, platform-full-regression

  - name: "authentication_failure"
    priority: 59
    domain: "API / Backend Service"
    subcategory: "Authentication Failure"
    impact: "Data Issue"
    label: "Authentication Failure"
    patterns:
      - "HTTP/1.1 4\\d{2}"
      - "401 Unauthorized"
      - "(?i)token.?expired"
      - "(?i)login failed"
      - "(?i)invalid.?credentials"
    action: "Validate test credentials. Check token expiration and auth configuration."
    scope: "global"
    # match_count: 2 | jobs: api-contract-validation, user-auth-e2e

  - name: "compilation_error"
    priority: 62
    domain: "Build / Configuration"
    subcategory: "Compilation Error"
    impact: "Product Regression Likely"
    label: "Compilation Error"
    patterns:
      - "(?i)compil(?:ation|e).*(?:failed|failure|error)"
      - "cannot find symbol"
      - "BUILD FAILURE"
      - "package .+ does not exist"
    action: "Review code changes for syntax errors. Check build tool versions."
    scope: "global"
    # match_count: 2 | jobs: database-migration-check

  - name: "dns_resolution"
    priority: 65
    domain: "Environment / Infrastructure"
    subcategory: "DNS Resolution"
    impact: "Infrastructure Likely"
    label: "DNS Resolution"
    patterns:
      - "DNS resolution failed"
      - "getaddrinfo.*(?:ENOTFOUND|failed)"
      - "Name or service not known"
    action: "Verify DNS configuration. Check network connectivity and resolver settings."
    scope: "global"
    # match_count: 2 | jobs: api-contract-validation, cdn-cache-validation

  - name: "permission_denied"
    priority: 68
    domain: "Environment / Infrastructure"
    subcategory: "Permission Denied"
    impact: "Infrastructure Likely"
    label: "Permission Denied"
    patterns:
      - "SQLSyntaxErrorException"
      - "Permission denied"
      - "Access denied"
    action: "Check file/directory permissions and user privileges. Verify access controls."
    scope: "global"
    # match_count: 2 | jobs: weekly-compliance-scan, frontend-selenium-suite

  # ==========================================================================
  # TIER 3: Single-occurrence patterns (review carefully)
  # ==========================================================================

  - name: "authorization_failure"
    priority: 100
    domain: "API / Backend Service"
    subcategory: "Authorization Failure"
    impact: "Data Issue"
    label: "Authorization Failure"
    patterns:
      - "HTTP/1.1 4\\d{2}"
      - "Access denied"
      - "403 Forbidden"
    action: "Review role-based access control. Verify user permissions for the resource."
    scope: "global"
    # match_count: 1 | jobs: user-auth-e2e

  - name: "missing_record"
    priority: 103
    domain: "Test Data"
    subcategory: "Missing Record"
    impact: "Data Issue"
    label: "Missing Record"
    patterns:
      - "(?i)no data returned"
      - "(?i)expected.+but (?:got|was|received)"
    action: "Validate test data setup. Check data initialization scripts."
    scope: "global"
    # match_count: 1 | jobs: nightly-data-integrity

  - name: "dependency_resolution"
    priority: 106
    domain: "Build / Configuration"
    subcategory: "Dependency Resolution"
    impact: "Test Issue"
    label: "Dependency Resolution"
    patterns:
      - "npm ERR!"
      - "ERESOLVE"
    action: "Verify dependencies in package.json/pom.xml. Check registry access."
    scope: "global"
    # match_count: 1 | jobs: order-processing-e2e

  - name: "schema_mismatch"
    priority: 109
    domain: "Build / Configuration"
    subcategory: "Schema Mismatch"
    impact: "Product Regression Likely"
    label: "Schema Mismatch"
    patterns:
      - "relation .+ does not exist"
    action: "Verify database schema matches expected state. Check migration scripts."
    scope: "global"
    # match_count: 1 | jobs: database-migration-check

  # ==========================================================================
  # TIER 5: Generic catch-all fallbacks
  # ==========================================================================

  - name: "generic_exception"
    priority: 900
    domain: "Automation / Framework"
    subcategory: "Unhandled Exception"
    impact: "Inconclusive"
    label: "Unhandled Exception"
    patterns:
      - "Exception"
      - "Error"
    action: "Manual investigation needed. Review full console output."
    scope: "global"

