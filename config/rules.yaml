fallback_labels:
  no_console_log: "No Console Data"
  no_pattern_match: "Unclassified Failure"
  success: "—"
  in_progress: "Build Running"
  aborted: "Build Aborted"

# Domain → color mapping for the frontend chip
# Keys MUST match the `domain` field on each rule below.
domain_colors:
  "UI / Locator": "teal"
  "Assertion": "rose"
  "Test Data": "amber"
  "Environment / Infrastructure": "orange"
  "Timeout": "yellow"
  "Browser / Session": "indigo"
  "API / Backend Service": "blue"
  "Build / Configuration": "purple"
  "Automation / Framework": "slate"
  "Unknown": "gray"

rules:
  - name: "timeline_event_not_found"
    priority: 5
    domain: "API / Backend Service"
    subcategory: "Timeline Event Missing"
    impact: "Product Regression Likely"
    label: "Timeline Event Missing"
    patterns:
      - "Unable to find timeline event"
      - "Timeline event:.*not found within"
    action: "Backend did not emit the expected event in time. Check the producing service (application, payment, document) and the event bus for delays, dropped messages, or a regression in the event publication flow."
    scope: "global"

  - name: "ui_element_wait_timeout"
    priority: 8
    domain: "UI / Locator"
    subcategory: "Element Wait Timeout"
    impact: "Test Issue"
    label: "Element Wait Timeout"
    patterns:
      - "Timed out after \\d+ seconds\\. Element not available"
      - "Timed out after \\d+ seconds waiting for element"
    action: "UI element didn't appear inside the wait window. Check locator validity, the page-load step preceding this one, and whether the prior action actually fired."
    scope: "global"

  # ---------- UI / Locator ----------
  - name: "selenium_no_such_element"
    priority: 10
    domain: "UI / Locator"
    subcategory: "Element Not Found"
    impact: "Test Issue"
    label: "Element Not Found"
    patterns:
      - "org\\.openqa\\.selenium\\.NoSuchElementException"
      - "no such element: Unable to locate element"
      - "Unable to locate element:\\s*\\{"
    action: "Locator changed or page not in expected state. Verify selector against current UI and check waits for the preceding step."
    scope: "global"

  - name: "selenium_stale_element"
    priority: 12
    domain: "UI / Locator"
    subcategory: "Stale Element Reference"
    impact: "Test Issue"
    label: "Stale Element"
    patterns:
      - "StaleElementReferenceException"
      - "stale element reference: element is not attached"
    action: "DOM re-rendered between locate and interact. Re-locate the element inside a retry/wait or use Serenity's resilient element APIs."
    scope: "global"

  - name: "selenium_click_intercepted"
    priority: 14
    domain: "UI / Locator"
    subcategory: "Click Intercepted"
    impact: "Test Issue"
    label: "Click Intercepted"
    patterns:
      - "ElementClickInterceptedException"
      - "element click intercepted"
      - "Other element would receive the click"
    action: "Overlay, modal, or sticky element is on top of the target. Add a wait for the blocker to disappear or scroll into view first."
    scope: "global"

  - name: "selenium_not_interactable"
    priority: 16
    domain: "UI / Locator"
    subcategory: "Not Interactable"
    impact: "Test Issue"
    label: "Element Not Interactable"
    patterns:
      - "ElementNotInteractableException"
      - "element not interactable"
      - "element not visible"
    action: "Element exists but is hidden, disabled, or off-screen. Verify state guards before the action."
    scope: "global"

  # ---------- Timeout ----------
  - name: "selenium_wait_timeout"
    priority: 18
    domain: "Timeout"
    subcategory: "WebDriver Wait Timeout"
    impact: "Test Issue"
    label: "Wait Timeout"
    patterns:
      - "org\\.openqa\\.selenium\\.TimeoutException"
      - "Expected condition failed: waiting for"
      - "Timed out after \\d+ seconds waiting for"
    action: "Explicit wait expired. Page or element took longer than expected — check app performance and wait duration."
    scope: "global"

  - name: "page_load_timeout"
    priority: 20
    domain: "Timeout"
    subcategory: "Page Load Timeout"
    impact: "Infrastructure Likely"
    label: "Page Load Timeout"
    patterns:
      - "page load timed out"
      - "Navigation timeout"
      - "Timeout loading page"
    action: "Page didn't finish loading. Check app/server response time and network."
    scope: "global"

  - name: "serenity_step_timeout"
    priority: 22
    domain: "Timeout"
    subcategory: "Serenity Step Timeout"
    impact: "Test Issue"
    label: "Step Timeout"
    patterns:
      - "serenity\\.step\\.timeout"
      - "Step timed out after"
    action: "Serenity step exceeded its time budget. Tune step or app performance."
    scope: "global"

  # ---------- Assertion ----------
  - name: "junit_assertion"
    priority: 24
    domain: "Assertion"
    subcategory: "JUnit Assertion"
    impact: "Test Issue"
    label: "Assertion Failed"
    patterns:
      - "java\\.lang\\.AssertionError"
      - "org\\.junit\\.ComparisonFailure"
      - "expected:.*<.*> but was:.*<.*>"
    action: "Actual value didn't match expected. Compare expected vs. actual — could be a real product regression or a stale test expectation."
    scope: "global"

  - name: "hamcrest_assertion"
    priority: 26
    domain: "Assertion"
    subcategory: "Hamcrest Assertion"
    impact: "Test Issue"
    label: "Hamcrest Mismatch"
    patterns:
      - "Expected:\\s.*\\s+but:\\s+was"
      - "org\\.hamcrest\\."
    action: "Hamcrest matcher failed. Diff Expected/but-was values against current app behavior."
    scope: "global"

  - name: "assertj_assertion"
    priority: 28
    domain: "Assertion"
    subcategory: "AssertJ Assertion"
    impact: "Test Issue"
    label: "AssertJ Failure"
    patterns:
      - "org\\.assertj\\.core\\."
      - "Expecting.*to be equal to"
      - "Expecting actual:"
    action: "AssertJ assertion failed. Review the soft-assert / chained condition that fired."
    scope: "global"

  # ---------- Cucumber framework ----------
  - name: "cucumber_pending"
    priority: 30
    domain: "Automation / Framework"
    subcategory: "Pending Step"
    impact: "Test Issue"
    label: "Pending Step"
    patterns:
      - "io\\.cucumber\\.java\\.PendingException"
      - "TODO: implement me"
    action: "Step is marked pending — implementation missing. Implement the step definition."
    scope: "global"

  - name: "cucumber_undefined_step"
    priority: 32
    domain: "Automation / Framework"
    subcategory: "Undefined Step"
    impact: "Test Issue"
    label: "Undefined Step"
    patterns:
      - "You can implement missing steps with the snippets below"
      - "Undefined step:"
    action: "Cucumber couldn't find a matching step definition. Add the @Given/@When/@Then or fix the feature wording."
    scope: "global"

  - name: "cucumber_ambiguous_step"
    priority: 34
    domain: "Automation / Framework"
    subcategory: "Ambiguous Step"
    impact: "Test Issue"
    label: "Ambiguous Step"
    patterns:
      - "io\\.cucumber\\.core\\.runner\\.AmbiguousStepDefinitionsException"
      - "Two step definitions match"
    action: "Multiple step definitions match the same Gherkin step. Tighten one of the regex/expressions."
    scope: "global"

  # ---------- Test Data ----------
  - name: "test_data_missing"
    priority: 36
    domain: "Test Data"
    subcategory: "Missing Record"
    impact: "Data Issue"
    label: "Missing Test Data"
    patterns:
      - "(?i)record not found"
      - "(?i)no data (returned|found)"
      - "(?i)test data .*(missing|empty|not available)"
    action: "Required test record is absent. Re-seed test data or verify the data-setup hook ran."
    scope: "global"

  - name: "test_data_null"
    priority: 38
    domain: "Test Data"
    subcategory: "Null Test Data"
    impact: "Data Issue"
    label: "Null Test Data"
    patterns:
      - "java\\.lang\\.NullPointerException.*testdata"
      - "Cannot invoke .* because .* is null"
    action: "Test data lookup returned null. Check data provider, fixture, or @Before hook output."
    scope: "global"

  # ---------- API / Backend Service ----------
  - name: "api_5xx"
    priority: 40
    domain: "API / Backend Service"
    subcategory: "HTTP 5xx"
    impact: "Product Regression Likely"
    label: "Service Error (5xx)"
    patterns:
      - "HTTP/1\\.1\" 5\\d{2}"
      - "status code:?\\s*5\\d{2}"
      - "Internal Server Error"
      - "502 Bad Gateway"
      - "503 Service Unavailable"
      - "504 Gateway Timeout"
    action: "Backend returned 5xx. Check service deploy logs — likely real regression."
    scope: "global"

  - name: "api_4xx_auth"
    priority: 42
    domain: "API / Backend Service"
    subcategory: "Auth Failure"
    impact: "Data Issue"
    label: "Auth Failure (401/403)"
    patterns:
      - "status code:?\\s*40[13]"
      - "401 Unauthorized"
      - "403 Forbidden"
      - "Invalid (token|credentials|API key)"
      - "token (expired|invalid)"
    action: "Auth rejected. Validate test user credentials and token freshness."
    scope: "global"

  - name: "api_4xx_notfound"
    priority: 44
    domain: "API / Backend Service"
    subcategory: "Resource Not Found"
    impact: "Data Issue"
    label: "Resource Not Found (404)"
    patterns:
      - "status code:?\\s*404"
      - "404 Not Found"
    action: "API returned 404. Check resource ID setup, URL, or whether the resource was deleted."
    scope: "global"

  # ==========================================================================
  # TIER 2 (50-99) — Environment / Browser / Build, broader signatures
  # ==========================================================================

  # ---------- Browser / Session ----------
  - name: "webdriver_session_not_created"
    priority: 50
    domain: "Browser / Session"
    subcategory: "Session Not Created"
    impact: "Infrastructure Likely"
    label: "Session Not Created"
    patterns:
      - "SessionNotCreatedException"
      - "session not created"
      - "unable to create (a |)session"
    action: "WebDriver couldn't start. Check browser/driver version mismatch and Selenium Grid availability."
    scope: "global"

  - name: "webdriver_chrome_crash"
    priority: 52
    domain: "Browser / Session"
    subcategory: "Browser Crash"
    impact: "Infrastructure Likely"
    label: "Browser Crashed"
    patterns:
      - "(chrome|chromium) (crashed|not reachable)"
      - "DevToolsActivePort file doesn't exist"
      - "tab crashed"
    action: "Browser process died. Often resource starvation on the grid — retry or check node health."
    scope: "global"

  - name: "webdriver_disconnected"
    priority: 54
    domain: "Browser / Session"
    subcategory: "Driver Disconnected"
    impact: "Infrastructure Likely"
    label: "Driver Disconnected"
    patterns:
      - "WebDriverException.*disconnected"
      - "Connection reset.*\\b(chromedriver|geckodriver|edgedriver)"
      - "no such window"
    action: "Driver lost connection mid-test. Likely grid/node instability — retry once."
    scope: "global"

  # ---------- Environment / Infrastructure ----------
  - name: "connection_refused"
    priority: 56
    domain: "Environment / Infrastructure"
    subcategory: "Connection Refused"
    impact: "Infrastructure Likely"
    label: "Service Unreachable"
    patterns:
      - "Connection refused"
      - "ECONNREFUSED"
      - "connect ECONNREFUSED"
    action: "Target service is down or firewalled. Verify it's running and reachable from the runner."
    scope: "global"

  - name: "dns_failure"
    priority: 58
    domain: "Environment / Infrastructure"
    subcategory: "DNS Resolution"
    impact: "Infrastructure Likely"
    label: "DNS Resolution Failure"
    patterns:
      - "UnknownHostException"
      - "Name or service not known"
      - "DNS resolution failed"
      - "getaddrinfo (failed|ENOTFOUND)"
    action: "Hostname didn't resolve. Verify DNS and that the env URL is correct."
    scope: "global"

  - name: "ssl_error"
    priority: 60
    domain: "Environment / Infrastructure"
    subcategory: "SSL / TLS Error"
    impact: "Infrastructure Likely"
    label: "SSL/TLS Error"
    patterns:
      - "SSLHandshakeException"
      - "CERTIFICATE_VERIFY_FAILED"
      - "unable to find valid certification path"
      - "PKIX path building failed"
    action: "Cert chain not trusted or expired. Refresh truststore or fix cert on the target service."
    scope: "global"

  - name: "db_connection"
    priority: 62
    domain: "Environment / Infrastructure"
    subcategory: "Database Connection"
    impact: "Infrastructure Likely"
    label: "DB Connection Issue"
    patterns:
      - "Connection pool exhausted"
      - "could not connect to.*database"
      - "ORA-\\d{5}"
      - "Communications link failure"
    action: "DB layer is failing. Check DB health, pool sizing, and credentials."
    scope: "global"

  - name: "oom_error"
    priority: 64
    domain: "Environment / Infrastructure"
    subcategory: "Out of Memory"
    impact: "Infrastructure Likely"
    label: "Out of Memory"
    patterns:
      - "java\\.lang\\.OutOfMemoryError"
      - "GC overhead limit exceeded"
      - "Cannot allocate memory"
    action: "JVM ran out of heap. Increase -Xmx or investigate leak in the test process."
    scope: "global"

  - name: "permission_denied"
    priority: 66
    domain: "Environment / Infrastructure"
    subcategory: "Permission Denied"
    impact: "Infrastructure Likely"
    label: "Permission Denied"
    patterns:
      - "Permission denied"
      - "Access is denied"
      - "AccessDeniedException"
    action: "File/dir/resource permission rejected. Check runner user privileges."
    scope: "global"

  # ---------- Build / Configuration ----------
  - name: "compilation_error"
    priority: 70
    domain: "Build / Configuration"
    subcategory: "Compilation Error"
    impact: "Product Regression Likely"
    label: "Compilation Failure"
    patterns:
      - "COMPILATION ERROR"
      - "BUILD FAILURE"
      - "cannot find symbol"
      - "package .* does not exist"
    action: "Code doesn't compile. Check recent commits and Maven/Gradle dependency changes."
    scope: "global"

  - name: "maven_dependency"
    priority: 72
    domain: "Build / Configuration"
    subcategory: "Dependency Resolution"
    impact: "Test Issue"
    label: "Dependency Failure"
    patterns:
      - "Could not resolve dependencies"
      - "Failed to read artifact descriptor"
      - "Non-resolvable parent POM"
    action: "Maven can't resolve a dependency. Check Nexus/Artifactory access and pom versions."
    scope: "global"

  - name: "surefire_no_tests"
    priority: 74
    domain: "Build / Configuration"
    subcategory: "No Tests Ran"
    impact: "Test Issue"
    label: "No Tests Executed"
    patterns:
      - "No tests were executed"
      - "Tests run: 0, Failures: 0, Errors: 0"
      - "There are no tests to run"
    action: "Suite ran with zero tests. Check Cucumber tag filters and test path config."
    scope: "global"

  # ==========================================================================
  # TIER 5 (900+) — Catch-all
  # ==========================================================================

  - name: "cucumber_step_failed"
    priority: 700
    domain: "Automation / Framework"
    subcategory: "Cucumber Step Failed"
    impact: "Test Issue"
    label: "Cucumber Step Failed"
    patterns:
      - "Test failed at step:"
      - "Failed scenarios:"
    action: "A Cucumber step failed but no specific rule matched it. Look at the line beginning 'Test failed at step:' for the failing step and read the lines around it for the immediate cause."
    scope: "global"

  - name: "generic_npe"
    priority: 800
    domain: "Automation / Framework"
    subcategory: "Null Reference"
    impact: "Test Issue"
    label: "NullPointerException"
    patterns:
      - "java\\.lang\\.NullPointerException"
      - "Cannot invoke .* because .* is null"
    action: "Null reference somewhere in step or page object. Read the stack trace for the offending line."
    scope: "global"

  - name: "generic_exception"
    priority: 900
    domain: "Automation / Framework"
    subcategory: "Unhandled Exception"
    impact: "Inconclusive"
    label: "Unhandled Exception"
    patterns:
      - "Exception"
      - "Error"
    action: "No specific signature matched. Open the console log and review the stack trace manually."
    scope: "global"
