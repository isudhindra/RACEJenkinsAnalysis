# ============================================================================
# Fallback labels for edge cases where no rule matches
# ============================================================================
fallback_labels:
  no_console_log: "No Console Data"
  no_pattern_match: "Unclassified Failure"
  success: "—"
  in_progress: "Build Running"
  aborted: "Build Aborted"

# ============================================================================
# Domain → color mapping for frontend log analysis chips
# Keys must match the 'domain' field on each rule exactly.
# Values are consumed by the frontend to color-code the label chip.
# ============================================================================
domain_colors:
  "API / Backend Service": "blue"
  "Environment / Infrastructure": "orange"
  "Build / Configuration": "purple"
  "UI / Frontend": "teal"
  "Test Data": "amber"
  "Automation / Framework": "slate"
  "Browser / Driver": "indigo"
  "Unknown": "gray"

rules:
  # ============================================================================
  # TIER 1 (1-49): Specific high-confidence signatures
  # Unique, long patterns that are diagnostic on their own
  # ============================================================================

  - name: "api_5xx"
    priority: 10
    domain: "API / Backend Service"
    subcategory: "HTTP 5xx"
    impact: "Product Regression Likely"
    label: "Service Error (5xx)"
    patterns:
      - "HTTP/1.1 5\\d{2}"
      - "Internal Server Error"
      - "502 Bad Gateway"
    action: "Check service deployment logs. Likely backend regression."
    scope: "global"

  - name: "dns_failure"
    priority: 12
    domain: "Environment / Infrastructure"
    subcategory: "DNS Resolution"
    impact: "Infrastructure Likely"
    label: "DNS Resolution Failure"
    patterns:
      - "Name or service not known"
      - "DNS resolution failed"
      - "getaddrinfo failed"
    action: "Verify DNS configuration. Check network connectivity and resolver settings."
    scope: "global"

  - name: "connection_refused"
    priority: 14
    domain: "Environment / Infrastructure"
    subcategory: "Connection Refused"
    impact: "Infrastructure Likely"
    label: "Service Unreachable"
    patterns:
      - "Connection refused"
      - "ECONNREFUSED"
      - "connect ECONNREFUSED"
    action: "Verify service is running and accessible. Check firewall and network policies."
    scope: "global"

  - name: "service_timeout"
    priority: 15
    domain: "Environment / Infrastructure"
    subcategory: "Timeout"
    impact: "Infrastructure Likely"
    label: "Service Timeout"
    patterns:
      - "timeout waiting for"
      - "timed out"
      - "exceeded.*timeout"
    action: "Check infrastructure health and network connectivity."
    scope: "global"

  - name: "oom_error"
    priority: 18
    domain: "Environment / Infrastructure"
    subcategory: "Out of Memory"
    impact: "Infrastructure Likely"
    label: "Out of Memory"
    patterns:
      - "OutOfMemoryError"
      - "java.lang.OutOfMemoryError"
      - "Cannot allocate memory"
    action: "Increase heap size or memory allocation. Review memory leak possibilities."
    scope: "global"

  - name: "element_not_found"
    priority: 20
    domain: "UI / Frontend"
    subcategory: "Locator Mismatch"
    impact: "Test Issue"
    label: "Element Not Found"
    patterns:
      - "no such element"
      - "element not found"
      - "stale element reference"
    action: "Review locator strategy. Check if UI changed in recent deployment."
    scope: "global"

  # ============================================================================
  # TIER 2 (50-99): Framework and tool-specific patterns
  # Distinctive but shared across multiple projects
  # ============================================================================

  - name: "compilation_error"
    priority: 22
    domain: "Build / Configuration"
    subcategory: "Compilation Error"
    impact: "Product Regression Likely"
    label: "Compilation Failure"
    patterns:
      - "compilation failed"
      - "BUILD FAILURE"
      - "cannot find symbol"
    action: "Review code changes for syntax errors. Check Java/build tool versions."
    scope: "global"

  - name: "npm_install_fail"
    priority: 24
    domain: "Build / Configuration"
    subcategory: "Dependency Resolution"
    impact: "Test Issue"
    label: "Dependency Failure"
    patterns:
      - "npm ERR!"
      - "ERESOLVE"
      - "peer dep"
    action: "Verify dependencies in package.json. Check npm registry access and versions."
    scope: "global"

  - name: "auth_failure"
    priority: 25
    domain: "API / Backend Service"
    subcategory: "Authentication Failure"
    impact: "Data Issue"
    label: "Auth Failure"
    patterns:
      - "401 Unauthorized"
      - "login failed"
      - "token expired"
    action: "Validate test credentials. Check token expiration."
    scope: "global"

  - name: "page_timeout"
    priority: 28
    domain: "UI / Frontend"
    subcategory: "Page Load Timeout"
    impact: "Infrastructure Likely"
    label: "UI Timeout"
    patterns:
      - "page load timed out"
      - "Navigation timeout"
      - "Timeout exceeded.*navigation"
    action: "Review page load performance. Check network conditions and server response times."
    scope: "global"

  - name: "missing_test_record"
    priority: 30
    domain: "Test Data"
    subcategory: "Missing Record"
    impact: "Data Issue"
    label: "Missing Test Data"
    patterns:
      - "record not found"
      - "no data returned"
    action: "Validate test data setup. Check data initialization scripts."
    scope: "global"

  - name: "db_connection"
    priority: 32
    domain: "Environment / Infrastructure"
    subcategory: "Database Connection"
    impact: "Infrastructure Likely"
    label: "DB Connection Issue"
    patterns:
      - "Connection pool exhausted"
      - "could not connect to server"
      - "database.*unavailable"
    action: "Verify database is running and accessible. Check connection pool settings."
    scope: "global"

  - name: "assertion_error"
    priority: 35
    domain: "Automation / Framework"
    subcategory: "Assertion Logic Error"
    impact: "Test Issue"
    label: "Assertion Failure"
    patterns:
      - "assertion failed"
      - "expected .* but got .*"
    action: "Review assertion logic and expected values."
    scope: "global"

  - name: "null_pointer"
    priority: 38
    domain: "Automation / Framework"
    subcategory: "Null Reference"
    impact: "Test Issue"
    label: "Null Reference"
    patterns:
      - "NullPointerException"
      - "TypeError.*null"
      - "TypeError.*undefined"
    action: "Review code for null/undefined reference handling. Add defensive checks."
    scope: "global"

  - name: "webdriver_session"
    priority: 40
    domain: "Browser / Driver"
    subcategory: "WebDriver Session Failure"
    impact: "Infrastructure Likely"
    label: "WebDriver Failure"
    patterns:
      - "session not created"
      - "unable to create session"
    action: "Verify WebDriver and browser version compatibility."
    scope: "global"

  - name: "ssl_error"
    priority: 42
    domain: "Environment / Infrastructure"
    subcategory: "SSL/TLS Error"
    impact: "Infrastructure Likely"
    label: "SSL/TLS Error"
    patterns:
      - "SSL.*certificate"
      - "CERTIFICATE_VERIFY_FAILED"
      - "unable to verify"
    action: "Verify SSL certificate validity and chain. Check certificate expiration dates."
    scope: "global"

  - name: "permission_denied"
    priority: 45
    domain: "Environment / Infrastructure"
    subcategory: "Permission Denied"
    impact: "Infrastructure Likely"
    label: "Permission Denied"
    patterns:
      - "Permission denied"
      - "Access denied"
      - "403 Forbidden"
    action: "Check file/directory permissions and user privileges. Verify access controls."
    scope: "global"

  # ============================================================================
  # TIER 5 (900+): Generic catch-all fallbacks
  # Short patterns like Exception, Error that match when nothing specific applies
  # ============================================================================

  - name: "generic_exception"
    priority: 900
    domain: "Automation / Framework"
    subcategory: "Unhandled Exception"
    impact: "Inconclusive"
    label: "Unhandled Exception"
    patterns:
      - "Exception"
      - "Error"
    action: "Manual investigation needed. Review full console output."
    scope: "global"
